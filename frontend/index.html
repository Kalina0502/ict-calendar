<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8" />
  <!-- FullCalendar от CDN -->
  <!-- <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script> -->

  <!-- FullCalendar локално включване -->
  <script src="../project-root/libs/fullcalendar/core/index.global.min.js"></script>
  <script src="../project-root/libs/fullcalendar/core/locales-all.global.min.js"></script>
  <script src="../project-root/libs/fullcalendar/daygrid/index.global.min.js"></script>
  <script src="../project-root/libs/fullcalendar/timegrid/index.global.min.js"></script>
  <script src="../project-root/libs/fullcalendar/list/index.global.min.js"></script>
  <script src="../project-root/libs/fullcalendar/interaction/index.global.min.js"></script>

  <!-- Export to PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="calendar-layout">
    <div id="filters">
      <label for="categoryFilter">Category:</label>
      <select id="categoryFilter">
        <option value="all">All</option>
        <option value="monthly">Monthly</option>
        <option value="internal">Internal</option>
        <option value="partner">Partner</option>
        <option value="training">Training</option>
      </select>

      <label for="locationFilter">Location:</label>
      <select id="locationFilter">
        <option value="all">All</option>
        <option value="varna">Varna</option>
        <option value="sofia">Sofia</option>
        <option value="plovdiv">Plovdiv</option>
        <option value="online">Online</option>
      </select>

      <label for="organizerFilter">Organizer:</label>
      <select id="organizerFilter">
        <option value="all">All</option>
        <option value="ict">ICT Cluster</option>
        <option value="partner">Partner</option>
      </select>

      <label for="keywordFilter">Search:</label>
      <input type="text" id="keywordFilter" placeholder="Search by keyword" />

      <button onclick="printView()">🖨 Print</button>
      <button onclick="exportToPDF()">📄 Export PDF</button>
    </div>

    <div id="calendar"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script src="../src/main.js"></script>
  </div>
</body>

</html>
